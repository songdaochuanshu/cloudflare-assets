name: Fix Manifest Tags

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install @aws-sdk/client-s3

      - name: Fix manifest categories and tags
        run: node buckets/songdaochuanshu-static/fix-manifest-tags.mjs
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BLOG_BUCKET: ${{ secrets.R2_BLOG_BUCKET || 'songdaochuanshu-static' }}
