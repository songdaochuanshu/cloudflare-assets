name: Generate Article

on:
  schedule:
    - cron: '0 1,7 * * *'  # 每天北京时间 9:00 和 15:00（UTC 1:00 和 7:00）
  workflow_dispatch:
    inputs:
      topic:
        description: '文章主题（留空则随机）'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Typecheck
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run typecheck"

      - name: Install dependencies and build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run build"

      - name: Generate article
        id: generate
        run: |
          docker run --rm \
            -e CF_ACCOUNT_ID \
            -e R2_KEY_ID \
            -e R2_SECRET_KEY \
            -e R2_BLOG_BUCKET \
            -e ZHIPU_API_KEY \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "
              if [ -z '${{ github.event.inputs.topic }}' ]; then
                node dist/scripts/blog/generate-article.js
              else
                node dist/scripts/blog/generate-article.js '${{ github.event.inputs.topic }}'
              fi
            "
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BLOG_BUCKET: songdaochuanshu-static
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}

      - name: Update manifest.json
        run: |
          docker run --rm \
            -e CF_ACCOUNT_ID \
            -e R2_KEY_ID \
            -e R2_SECRET_KEY \
            -e R2_BLOG_BUCKET \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            node dist/scripts/blog/crawl-cnblogs.js --fix-manifest
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BLOG_BUCKET: songdaochuanshu-static

      - name: Send email notification
        if: always()
        run: |
          docker run --rm \
            -e RESEND_API_KEY \
            -e NOTIFY_EMAIL \
            -e EMAIL_FROM \
            -e WORKFLOW_NAME \
            -e WORKFLOW_STATUS \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            node dist/scripts/email-notifier.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WORKFLOW_NAME: generate-article
          WORKFLOW_STATUS: ${{ job.status }}

      - name: Upload workflow result as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-result
          path: workflow-result.json
          retention-days: 7
