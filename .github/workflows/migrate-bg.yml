name: Migrate backgrounds to normal

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run migration
        run: node r2/migrate-backgrounds.mjs
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: *** secrets.R2_SECRET_KEY }}
          R2_HOMEPAGE_BUCKET: ${{ secrets.R2_HOMEPAGE_BUCKET }}
