name: Crawl CNBlogs

on:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间 10:00（UTC 2:00）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'crawl'
        type: choice
        options:
          - crawl
          - fix_manifest
          - clean_articles

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Typecheck
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run typecheck"

      - name: Install dependencies and build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run build"

      - name: Run crawler
        run: |
          docker run --rm \
            -e CF_ACCOUNT_ID \
            -e R2_KEY_ID \
            -e R2_SECRET_KEY \
            -e R2_BLOG_BUCKET \
            -e ZHIPU_API_KEY \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "
              MODE='${{ github.event.inputs.mode }}'
              case \$MODE in
                fix_manifest) node dist/scripts/blog/crawl-cnblogs.js --fix-manifest ;;
                clean_articles) node dist/scripts/blog/crawl-cnblogs.js --clean-articles ;;
                *) node dist/scripts/blog/crawl-cnblogs.js ;;
              esac
            "
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BLOG_BUCKET: songdaochuanshu-static
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}

      - name: Send email notification
        if: always()
        run: |
          docker run --rm \
            -e RESEND_API_KEY \
            -e NOTIFY_EMAIL \
            -e EMAIL_FROM \
            -e WORKFLOW_NAME \
            -e WORKFLOW_STATUS \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            node dist/scripts/email-notifier.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WORKFLOW_NAME: 'crawl-cnblogs'
          WORKFLOW_STATUS: ${{ job.status }}
