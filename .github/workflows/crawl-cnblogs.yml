name: Crawl CNBlogs

on:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间 10:00（UTC 2:00）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'crawl'
        type: choice
        options:
          - crawl
          - fix_manifest
          - clean_articles

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run crawler
        run: |
          docker run --rm \
            -e CF_ACCOUNT_ID \
            -e R2_KEY_ID \
            -e R2_SECRET_KEY \
            -e R2_BLOG_BUCKET \
            -e ZHIPU_API_KEY \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm install @aws-sdk/client-s3 && \
              if [ '${{ github.event.inputs.mode }}' = 'fix_manifest' ]; then \
                node buckets/songdaochuanshu-static/crawl-cnblogs.mjs --fix-manifest; \
              elif [ '${{ github.event.inputs.mode }}' = 'clean_articles' ]; then \
                node buckets/songdaochuanshu-static/crawl-cnblogs.mjs --clean-articles; \
              else \
                node buckets/songdaochuanshu-static/crawl-cnblogs.mjs; \
              fi"
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: *** secrets.R2_SECRET_KEY }}
          R2_BLOG_BUCKET: songdaochuanshu-static
          ZHIPU_API_KEY: *** secrets.ZHIPU_API_KEY }}
