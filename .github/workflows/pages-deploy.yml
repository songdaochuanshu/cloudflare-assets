name: Pages Deploy

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Pages 项目名称'
        required: true
        type: string
      branch:
        description: '分支（可选，默认使用 production_branch）'
        required: false
        type: string
      cancel_deployment_id:
        description: '取消指定部署 ID（留空则触发新部署）'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node CI
        uses: ./.github/actions/node-ci
        with:
          run-typecheck: 'false'

      - name: Trigger Pages deployment
        id: deploy
        run: |
          if [ -n "${{ inputs.cancel_deployment_id }}" ]; then
            node dist/scripts/pages/deploy.js ${{ inputs.project }} --cancel ${{ inputs.cancel_deployment_id }}
          else
            node dist/scripts/pages/deploy.js ${{ inputs.project }} ${{ inputs.branch }}
          fi
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Send email notification
        if: always()
        run: node dist/scripts/email-notifier.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WORKFLOW_NAME: pages-deploy-${{ inputs.project }}
          WORKFLOW_STATUS: ${{ job.status }}
