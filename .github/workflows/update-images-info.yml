name: Update Images Info

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 (北京 08:00)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node CI
        uses: ./.github/actions/node-ci

      - name: Run update script
        run: node dist/scripts/homepage-bg/update-images-info.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_HOMEPAGE_BUCKET: homepage-bg

      - name: Send email notification
        if: always()
        run: node dist/scripts/email-notifier.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WORKFLOW_NAME: 'update-images-info'
          WORKFLOW_STATUS: ${{ job.status }}
