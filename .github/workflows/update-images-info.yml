name: Update Images Info

on:
  push:
    branches: [main]
    paths:
      - 'src/buckets/homepage-bg/update-images-info.ts'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - '.github/workflows/update-images-info.yml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typecheck
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run typecheck"

      - name: Install dependencies and build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run build"

      - name: Run update script
        run: |
          docker run --rm \
            -e CF_ACCOUNT_ID \
            -e R2_KEY_ID \
            -e R2_SECRET_KEY \
            -e R2_HOMEPAGE_BUCKET \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            node dist/buckets/homepage-bg/update-images-info.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_HOMEPAGE_BUCKET: homepage-bg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images-info.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update images-info.json from R2 bucket"
            git push
          fi
