name: Update Images Info

on:
  push:
    branches: [main]
    paths:
      - 'update-images-info.mjs'
      - '.github/workflows/update-images-info.yml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: homepage-bg
        run: node update-images-info.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images-info.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update images-info.json from R2 bucket"
            git push
          fi
