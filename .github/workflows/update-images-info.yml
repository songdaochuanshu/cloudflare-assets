name: Update Images Info

on:
  push:
    branches: [main]
    paths:
      - 'src/scripts/homepage-bg/update-images-info.ts'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - '.github/workflows/update-images-info.yml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node CI
        uses: ./.github/actions/node-ci

      - name: Run update script
        run: node dist/scripts/homepage-bg/update-images-info.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_HOMEPAGE_BUCKET: homepage-bg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images-info.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update images-info.json from R2 bucket"
            git push
          fi

      - name: Send email notification
        if: always()
        run: node dist/scripts/email-notifier.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WORKFLOW_NAME: 'update-images-info'
          WORKFLOW_STATUS: ${{ job.status }}
