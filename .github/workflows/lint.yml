name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - '*.{js,ts,json,yml}'
      - '.github/workflows/lint.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.prettierrc*'
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - '*.{js,ts,json,yml}'
      - '.github/workflows/lint.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.prettierrc*'

jobs:
  lint:
    name: ESLint + Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npx prettier --check "src/**/*.ts" "*.{json,yml,yaml}"
