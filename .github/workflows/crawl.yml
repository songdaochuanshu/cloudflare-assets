name: Crawl Lolicon Images (R18 + Normal)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 (北京 09:00)
    - cron: '0 5 * * *'   # UTC 05:00 (北京 13:00)
    - cron: '0 9 * * *'   # UTC 09:00 (北京 17:00)
    - cron: '0 13 * * *'  # UTC 13:00 (北京 21:00)
    - cron: '0 17 * * *'  # UTC 17:00 (北京 01:00)

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies and build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run build"

      - name: Crawl Lolicon images
        id: crawl
        run: |
          docker run --rm \
            -e CF_ACCOUNT_ID \
            -e R2_KEY_ID \
            -e R2_SECRET_KEY \
            -e R2_HOMEPAGE_BUCKET \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            node dist/buckets/homepage-bg/crawl-lolicon.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_HOMEPAGE_BUCKET: ${{ secrets.R2_HOMEPAGE_BUCKET }}

      - name: Send email notification
        if: always()
        run: |
          docker run --rm \
            -e RESEND_API_KEY \
            -e NOTIFY_EMAIL \
            -e WORKFLOW_NAME \
            -e WORKFLOW_STATUS \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            node dist/utils/email-notifier.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          WORKFLOW_NAME: 'crawl-lolicon'
          WORKFLOW_STATUS: ${{ job.status }}
