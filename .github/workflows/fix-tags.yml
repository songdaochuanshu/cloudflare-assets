name: Fix Tags
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Typecheck
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run typecheck"

      - name: Install dependencies and build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            bash -c "npm ci && npm run build"

      - name: Run fix
        run: |
          docker run --rm \
            -e CF_ACCOUNT_ID -e R2_KEY_ID -e R2_SECRET_KEY -e R2_BLOG_BUCKET -e ZHIPU_API_KEY \
            -v "${{ github.workspace }}:/app" -w /app node:20-slim \
            node dist/scripts/blog/fix-manifest-tags.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BLOG_BUCKET: ${{ secrets.R2_BLOG_BUCKET || 'songdaochuanshu-static' }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}

      - name: Send email notification
        if: always()
        run: |
          docker run --rm \
            -e RESEND_API_KEY \
            -e NOTIFY_EMAIL \
            -e EMAIL_FROM \
            -e WORKFLOW_NAME \
            -e WORKFLOW_STATUS \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            node:20-slim \
            node dist/scripts/email-notifier.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WORKFLOW_NAME: 'fix-manifest-tags'
          WORKFLOW_STATUS: ${{ job.status }}
