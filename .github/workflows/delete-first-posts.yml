name: Delete First Posts

on:
  workflow_dispatch:  # 手动触发

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install @aws-sdk/client-s3
      
      - name: Delete first 3 posts
        run: node buckets/songdaochuanshu-static/delete-first-posts.mjs
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BLOG_BUCKET: songdaochuanshu-static
      
      - name: Update manifest.json
        run: node buckets/songdaochuanshu-static/crawl-cnblogs.mjs --fix-manifest
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BLOG_BUCKET: songdaochuanshu-static
      
      - name: Send email notification
        if: always()
        run: node utils/email-notifier.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          WORKFLOW_NAME: delete-first-posts
          WORKFLOW_STATUS: ${{ job.status }}
