name: Delete Non-Lolicon Images

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node CI
        uses: ./.github/actions/node-ci

      - name: Delete non-Lolicon images from R2
        run: node dist/scripts/homepage-bg/delete-non-lolicon.js
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_HOMEPAGE_BUCKET: ${{ secrets.R2_HOMEPAGE_BUCKET }}

      - name: Send email notification
        if: always()
        run: node dist/scripts/email-notifier.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WORKFLOW_NAME: 'delete-non-lolicon'
          WORKFLOW_STATUS: ${{ job.status }}
